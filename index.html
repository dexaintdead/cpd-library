<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CPD Blackbook — The Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   CPD LIBRARY — Knowledge Base + Document Host
   ═══════════════════════════════════════════════════════════ */
:root{
  --bg:#0C0C0C;--bg2:#131313;--bg3:#1A1A1A;--bg4:#222;--bg5:#2A2A2A;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--bd3:rgba(255,255,255,0.18);
  --tx:#FFFFFF;--dim:#8A8698;--muted:#6A6678;
  --red:#D63030;--red-lo:rgba(214,48,48,0.1);--red-b:rgba(214,48,48,0.22);
  --gold:#C9A84C;--gold-lo:rgba(201,168,76,0.1);--gold-b:rgba(201,168,76,0.25);
  --green:#2DBD78;--green-lo:rgba(45,189,120,0.1);--green-b:rgba(45,189,120,0.25);
  --blue:#3478C8;--blue-lo:rgba(52,120,200,0.1);--blue-b:rgba(52,120,200,0.25);
  --purple:#9B5DE5;--purple-lo:rgba(155,93,229,0.1);--purple-b:rgba(155,93,229,0.25);
  --teal:#00C2B2;--teal-lo:rgba(0,194,178,0.1);--teal-b:rgba(0,194,178,0.25);
  --orange:#F97316;--orange-lo:rgba(249,115,22,0.1);--orange-b:rgba(249,115,22,0.25);
  --fd:'Bebas Neue',sans-serif;--fm:'JetBrains Mono',monospace;--fs:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fs);overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
button{cursor:pointer;border:none;background:none;font-family:var(--fs);color:inherit}
input,textarea,select{font-family:var(--fs);color:var(--tx)}
a{color:inherit;text-decoration:none}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:60px;background:var(--bg2);
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:16px;
}
.tb-left{display:flex;align-items:center;gap:14px;min-width:0}
.tb-brand{font-family:var(--fd);font-size:22px;letter-spacing:.08em;color:var(--dim);white-space:nowrap}
.tb-brand span{color:var(--red)}
.tb-sep{width:1px;height:22px;background:var(--bd2)}
.tb-title{font-family:var(--fd);font-size:22px;letter-spacing:.07em;white-space:nowrap}
.tb-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;
  background:var(--green-lo);border:1px solid var(--green-b);
  font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--green)}
.tb-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tb-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-search-wrap{position:relative;flex:1;max-width:520px;min-width:0}
.tb-search{
  width:100%;height:38px;padding:0 14px 0 38px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--bd2);
  font-family:var(--fm);font-size:14px;color:var(--tx);outline:none;transition:all .15s
}
.tb-search:focus{border-color:var(--gold-b);background:var(--bg4)}
.tb-search::placeholder{color:var(--muted)}
.tb-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--muted);pointer-events:none}
.tb-search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-family:var(--fm);font-size:11px;color:var(--muted);padding:2px 6px;
  border:1px solid var(--bd2);border-radius:4px;background:var(--bg);pointer-events:none}

/* ── LAYOUT ── */
.body{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:280px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden
}
.sb-head{padding:18px 18px 14px;border-bottom:1px solid var(--bd)}
.sb-eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.18em;color:var(--gold);margin-bottom:4px}
.sb-headline{font-family:var(--fd);font-size:30px;letter-spacing:.05em;line-height:1}
.sb-sub{font-family:var(--fm);font-size:12px;color:var(--dim);margin-top:6px;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.sb-sec{font-family:var(--fm);font-size:11px;letter-spacing:.16em;color:var(--muted);
  text-transform:uppercase;padding:10px 10px 6px}
.sb-sec:first-child{padding-top:4px}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;
  font-size:14px;color:var(--dim);cursor:pointer;transition:all .12s;
  border:1px solid transparent;width:100%;text-align:left
}
.sb-item:hover{background:var(--bg3);color:var(--tx)}
.sb-item.active{background:var(--gold-lo);color:var(--tx);border-color:var(--gold-b)}
.sb-item.active .sb-dot{background:var(--gold)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sb-item-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-count{font-family:var(--fm);font-size:11px;color:var(--muted)}

/* ── MAIN PANEL ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0}
.main-inner{max-width:1100px;margin:0 auto;padding:28px 32px 60px}

/* ── HERO (HOME) ── */
.hero{
  position:relative;padding:36px 32px;border-radius:14px;
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1px solid var(--bd2);margin-bottom:24px;overflow:hidden
}
.hero::before{
  content:'';position:absolute;top:-50%;right:-20%;width:60%;height:200%;
  background:radial-gradient(circle,var(--gold-lo) 0%,transparent 60%);
  pointer-events:none
}
.hero-eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.2em;color:var(--gold);margin-bottom:10px;position:relative}
.hero-title{font-family:var(--fd);font-size:52px;letter-spacing:.04em;line-height:1;position:relative}
.hero-title span{color:var(--red)}
.hero-sub{font-size:16px;color:var(--dim);margin-top:12px;max-width:640px;line-height:1.55;position:relative}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;position:relative}
.hero-stat{background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;padding:12px 14px}
.hero-stat-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.hero-stat-val{font-family:var(--fd);font-size:26px;letter-spacing:.04em;margin-top:4px}
.hero-stat-val.gold{color:var(--gold)}
.hero-stat-val.green{color:var(--green)}

/* ── SECTION HEADERS ── */
.sec{margin-bottom:32px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.sec-title{font-family:var(--fd);font-size:24px;letter-spacing:.06em}
.sec-sub{font-size:13px;color:var(--dim);font-family:var(--fm)}

/* ── TOOL CARDS GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden
}
.card:hover{border-color:var(--bd3);transform:translateY(-1px);background:var(--bg3)}
.card-tag{
  display:inline-block;font-family:var(--fm);font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-bottom:10px
}
.card-tag.core{background:var(--red-lo);color:var(--red);border:1px solid var(--red-b)}
.card-tag.sales{background:var(--gold-lo);color:var(--gold);border:1px solid var(--gold-b)}
.card-tag.intel{background:var(--blue-lo);color:var(--blue);border:1px solid var(--blue-b)}
.card-tag.community{background:var(--purple-lo);color:var(--purple);border:1px solid var(--purple-b)}
.card-tag.money{background:var(--green-lo);color:var(--green);border:1px solid var(--green-b)}
.card-tag.specialist{background:var(--teal-lo);color:var(--teal);border:1px solid var(--teal-b)}
.card-tag.admin{background:var(--orange-lo);color:var(--orange);border:1px solid var(--orange-b)}
.card-title{font-family:var(--fd);font-size:22px;letter-spacing:.04em;line-height:1.05}
.card-desc{font-size:13px;color:var(--dim);margin-top:8px;line-height:1.5}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)}
.card-meta{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.08em}
.card-arrow{color:var(--gold);font-family:var(--fd);font-size:16px;letter-spacing:.1em}

/* ── ARTICLE VIEW ── */
.article{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.article-head{padding:28px 32px 24px;border-bottom:1px solid var(--bd);position:relative}
.article-crumb{font-family:var(--fm);font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.article-crumb a{color:var(--gold);cursor:pointer}
.article-crumb a:hover{color:var(--tx)}
.article-title{font-family:var(--fd);font-size:44px;letter-spacing:.04em;line-height:1}
.article-sub{font-size:15px;color:var(--dim);margin-top:10px;line-height:1.5;max-width:720px}
.article-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:7px;
  font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;border:1px solid var(--bd2);color:var(--tx);
  background:var(--bg3);transition:all .15s;cursor:pointer
}
.btn:hover{background:var(--bg4);border-color:var(--bd3)}
.btn.prim{background:var(--red);border-color:var(--red);color:#fff}
.btn.prim:hover{background:#b82626}
.btn.gold{background:var(--gold-lo);border-color:var(--gold-b);color:var(--gold)}
.btn.gold:hover{background:var(--gold);color:#000}
.btn.green{background:var(--green-lo);border-color:var(--green-b);color:var(--green)}
.btn.green:hover{background:var(--green);color:#000}
.btn svg{width:13px;height:13px}

.article-body{padding:28px 32px}
.article-body h2{font-family:var(--fd);font-size:24px;letter-spacing:.05em;margin:26px 0 10px;color:var(--tx)}
.article-body h2:first-child{margin-top:0}
.article-body h3{font-family:var(--fd);font-size:18px;letter-spacing:.05em;margin:20px 0 8px;color:var(--gold)}
.article-body p{color:#D5D0E0;line-height:1.7;margin-bottom:14px;font-size:15px}
.article-body ul,.article-body ol{margin:8px 0 16px 22px;color:#D5D0E0;line-height:1.7;font-size:15px}
.article-body li{margin-bottom:6px}
.article-body li strong{color:var(--tx)}
.article-body code{font-family:var(--fm);font-size:13px;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--gold)}
.article-body blockquote{border-left:3px solid var(--gold);padding:8px 16px;margin:14px 0;color:var(--dim);font-style:italic;background:var(--bg3);border-radius:0 6px 6px 0}
.article-body .callout{
  padding:16px 18px;margin:18px 0;border-radius:8px;
  background:var(--bg3);border:1px solid var(--bd2);border-left:3px solid var(--gold)
}
.article-body .callout.scenario{border-left-color:var(--green);background:var(--green-lo)}
.article-body .callout.scenario strong{color:var(--green)}
.article-body .callout.warning{border-left-color:var(--orange);background:var(--orange-lo)}
.article-body .callout.warning strong{color:var(--orange)}
.article-body .callout-title{font-family:var(--fd);font-size:16px;letter-spacing:.04em;margin-bottom:6px;color:var(--tx)}

/* ── REFERRAL LINK BOX ── */
.reflink{
  background:linear-gradient(135deg,var(--gold-lo) 0%,rgba(0,0,0,.3) 100%);
  border:1px solid var(--gold-b);border-radius:12px;padding:22px;margin:24px 0
}
.reflink-eyebrow{font-family:var(--fm);font-size:11px;letter-spacing:.16em;color:var(--gold);margin-bottom:6px}
.reflink-title{font-family:var(--fd);font-size:26px;letter-spacing:.05em;margin-bottom:8px}
.reflink-sub{color:var(--dim);font-size:14px;line-height:1.5;margin-bottom:14px}
.reflink-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.reflink-box{
  flex:1;min-width:200px;background:var(--bg);border:1px solid var(--bd2);
  border-radius:7px;padding:10px 14px;font-family:var(--fm);font-size:12px;
  color:var(--gold);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.reflink-share{display:flex;gap:8px;flex-wrap:wrap}
.reflink-share button{flex:1;min-width:120px}

/* ── DOCS (UPLOADED / HOSTED FILES) ── */
.doc-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-top:12px}
.doc{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--bg2);border:1px solid var(--bd);border-radius:8px;transition:all .15s
}
.doc:hover{border-color:var(--bd3);background:var(--bg3)}
.doc-ico{width:38px;height:44px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:11px;letter-spacing:.04em;flex-shrink:0;color:#fff}
.doc-ico.pdf{background:var(--red)}
.doc-ico.doc{background:var(--blue)}
.doc-ico.xls{background:var(--green)}
.doc-ico.ppt{background:var(--orange)}
.doc-ico.md{background:var(--gold);color:#000}
.doc-ico.txt{background:var(--muted)}
.doc-ico.img{background:var(--purple)}
.doc-main{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-meta{font-family:var(--fm);font-size:11px;color:var(--muted);margin-top:3px}
.doc-acts{display:flex;gap:4px;flex-shrink:0}
.doc-act{
  width:30px;height:30px;border-radius:5px;background:var(--bg3);border:1px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;color:var(--dim);transition:all .12s
}
.doc-act:hover{background:var(--bg4);color:var(--tx);border-color:var(--bd3)}
.doc-act svg{width:14px;height:14px}

/* ── SEARCH RESULTS ── */
.search-results{display:flex;flex-direction:column;gap:8px}
.search-result{
  padding:14px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;
  cursor:pointer;transition:all .15s
}
.search-result:hover{border-color:var(--gold-b);background:var(--bg3)}
.search-result-kind{font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.search-result-title{font-family:var(--fd);font-size:20px;letter-spacing:.04em;margin-bottom:4px}
.search-result-snippet{font-size:13px;color:var(--dim);line-height:1.5}
.search-result-snippet mark{background:var(--gold-lo);color:var(--gold);padding:0 2px;border-radius:3px}
.search-empty{text-align:center;padding:60px 20px;color:var(--dim)}
.search-empty-ico{font-family:var(--fd);font-size:60px;color:var(--bd3);margin-bottom:14px}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  padding:12px 20px;background:var(--bg3);border:1px solid var(--bd3);border-radius:8px;
  font-family:var(--fm);font-size:13px;color:var(--tx);z-index:9999;
  box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .3s ease-out;pointer-events:none
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.green{border-color:var(--green-b);color:var(--green)}

/* ── MOBILE ── */
@media(max-width:900px){
  .sidebar{position:absolute;left:-100%;top:60px;height:calc(100vh - 60px);z-index:50;transition:left .25s}
  .sidebar.open{left:0}
  .tb-search-wrap{max-width:none}
  .hero-title{font-size:38px}
  .hero-stats{grid-template-columns:repeat(2,1fr)}
  .main-inner{padding:20px 16px 40px}
  .article-head,.article-body{padding:22px 20px}
  .article-title{font-size:32px}
  .tb-menu-btn{display:flex!important}
}
.tb-menu-btn{display:none;width:38px;height:38px;align-items:center;justify-content:center;
  border-radius:7px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx)}
.tb-menu-btn svg{width:18px;height:18px}

/* ── STATE TOGGLES ── */
.view{display:none}
.view.active{display:block}
</style>
</head>
<body>

<div class="app">

  <!-- ═══ TOPBAR ═══ -->
  <header class="topbar">
    <div class="tb-left">
      <button class="tb-menu-btn" onclick="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 5h14M2 9h14M2 13h14"/></svg>
      </button>
      <div class="tb-brand">CPD<span>.</span></div>
      <div class="tb-sep"></div>
      <div class="tb-title">THE LIBRARY</div>
      <div class="tb-pill"><span class="tb-pill-dot"></span>LIVE</div>
    </div>
    <div class="tb-search-wrap">
      <svg class="tb-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l4 4"/></svg>
      <input id="gsearch" class="tb-search" type="text" placeholder="Search tools, guides, scenarios, documents..." autocomplete="off">
      <span class="tb-search-kbd">/</span>
    </div>
    <div class="tb-right" id="tb-right">
      <!-- populated by JS -->
    </div>
  </header>

  <!-- ═══ BODY ═══ -->
  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-head">
        <div class="sb-eyebrow">◆ KNOWLEDGE BASE</div>
        <div class="sb-headline">LIBRARY</div>
        <div class="sb-sub">Everything about every tool. Share it. Print it. Earn from it.</div>
      </div>
      <nav class="sb-nav" id="sb-nav">
        <!-- populated by JS -->
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main">
      <div class="main-inner">

        <!-- HOME VIEW -->
        <div class="view active" id="view-home"></div>

        <!-- CATEGORY VIEW -->
        <div class="view" id="view-category"></div>

        <!-- ARTICLE VIEW -->
        <div class="view" id="view-article"></div>

        <!-- DOCS VIEW -->
        <div class="view" id="view-docs"></div>

        <!-- SEARCH VIEW -->
        <div class="view" id="view-search"></div>

      </div>
    </main>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════
   CPD LIBRARY — data + logic
   ════════════════════════════════════════════════════════════════ */

var CF_WORKER     = 'https://cpd-api.dex-fe2.workers.dev';
var LW_BASE_URL   = 'https://cpdblackbook.com/lifeworkos';
var FF_BASE_URL   = 'https://cpdblackbook.com/fit-finder';
var LIB_BASE_URL  = 'https://cpdblackbook.com/library';

var MEMBER_ID   = '';
var MEMBER_NAME = '';
var MEMBER_PLAN = '';

/* Listen for member identity pushed from the parent dashboard */
window.addEventListener('message', function(e){
  if(!e || !e.data) return;
  var d = e.data;
  if(d.member_id || d.memberId){
    MEMBER_ID   = d.member_id || d.memberId || MEMBER_ID;
    MEMBER_NAME = d.memberName || d.member_name || MEMBER_NAME;
    MEMBER_PLAN = d.plan || MEMBER_PLAN;
    refreshRefLinks();
  }
});

/* Allow ?member_id=... direct query */
(function(){
  var p = new URLSearchParams(location.search);
  MEMBER_ID   = p.get('member_id') || MEMBER_ID;
  MEMBER_NAME = p.get('member_name') || MEMBER_NAME;
  MEMBER_PLAN = p.get('plan') || MEMBER_PLAN;
})();

function cpdAuthHeaders(){
  var h = { 'Content-Type':'application/json' };
  if(MEMBER_ID) h['X-Member-Id'] = MEMBER_ID;
  return h;
}

function toast(msg, kind){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind||'');
  clearTimeout(t._tmr);
  t._tmr = setTimeout(function(){ t.className = 'toast ' + (kind||''); }, 2400);
}

function silentCopy(text, cb){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ if(cb)cb(); }).catch(function(){ fallbackCopy(text,cb); });
  } else { fallbackCopy(text,cb); }
}
function fallbackCopy(text, cb){
  var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  if(cb) cb();
}

/* Build a tracked referral link for any destination */
function buildRefLink(baseUrl){
  if(!MEMBER_ID) return baseUrl;
  var u = baseUrl + '?ref=' + encodeURIComponent(MEMBER_ID);
  if(MEMBER_NAME) u += '&ref_name=' + encodeURIComponent(MEMBER_NAME);
  return u;
}

function trackLinkShare(source){
  if(!MEMBER_ID) return;
  try{
    fetch(CF_WORKER + '/track-link-share', {
      method:'POST', headers:cpdAuthHeaders(),
      body: JSON.stringify({
        member_id: MEMBER_ID, member_name: MEMBER_NAME || '', source: source || 'library'
      })
    }).catch(function(){});
  }catch(e){}
}

/* Re-render any visible ref-link boxes when member identity changes */
function refreshRefLinks(){
  document.querySelectorAll('[data-reflink]').forEach(function(el){
    var base = el.getAttribute('data-reflink');
    el.textContent = buildRefLink(base);
  });
}

<h2>The Problem</h2>\
<p>Most platforms are honest about being one thing. A CRM is a CRM. A content tool is a content tool. A trading terminal is a trading terminal. But your life isn\'t one thing — you\'re pitching a brand in the morning, writing a listing in the afternoon, approving a post at dinner, and checking a prediction market before bed. Every switch is a tax.</p>\
<p>LifeWork OS removes that tax. Not with one bloated super-app — by engineering <strong>a connected system where every tool is a specialist and every specialist shares one brain.</strong></p>\
<h2>The Three Layers</h2>\
<h3>Layer One — The Surface</h3>\
<p>The part you touch: dashboard, tools, reports, charts, calendar, chat. Dozens of purpose-built workspaces. <strong>The critical rule: the surface can read the world but cannot change it.</strong> Anything in your browser is visible to anyone with a developer console, so the browser never writes to the database directly.</p>\
<h3>Layer Two — The Gatekeeper</h3>\
<p>A Cloudflare Worker at the edge. It holds the only master key. It verifies identity, confirms ownership, meters credits, applies business rules, writes the change, returns. Every AI call also passes through here, so AI keys are never exposed.</p>\
<h3>Layer Three — The Vault</h3>\
<p>Source of truth. ~90 tables organized by domain: Identity, Money, Reports, Agency, Content, CRM, Messaging, Commerce, Intelligence, Rep Ops. <strong>Every table locked by row-level security — the database itself refuses writes the Gatekeeper didn\'t authorize.</strong></p>\
<h2>The Shared Brain</h2>\
<h3>One Contact Graph</h3>\
<p>Every person you encounter — Exec Prospector, Pipeline import, community DM, typed manually — becomes one node. Fact Finder can show every report that references them, every campaign, every deal, every message.</p>\
<h3>One Reports Drive</h3>\
<p>Every AI report from every tool dual-writes: lands in the tool that made it, and lands in the canonical Reports Drive. Anything you generate is instantly findable, shareable, attachable, co-editable.</p>\
<h3>One Wallet</h3>\
<p>One credit balance across every tool. Gatekeeper deducts <em>before</em> running the AI call. If you don\'t have the credits, the action never fires. If it fires, the deduction is already logged.</p>\
<h3>One Message Bus</h3>\
<p>Every workspace talks to every other via an internal event bus. Content Studio schedules a post → Campaign Calendar refreshes. Deal Room saves a proposal → Pipeline updates stage. Share a report in chat → recipient\'s Inbox pings in real time.</p>\
<div class="callout scenario"><div class="callout-title">Scenario: A Single Click</div>\
<p>You\'re on an exec\'s profile in Exec Prospector. You hit "Send to Pipeline." In the next 400ms: Exec Prospector publishes an event → Pipeline and Fact Finder listen → Gatekeeper verifies identity, ownership, shape, whitelist → writes to Pipeline table → writes to contacts table → returns success → Pipeline board refreshes, Dashboard flashes toast, Fact Finder queues enrichment. One click. Six coordinated actions. Zero risk of partial state.</p></div>\
<h2>The Daily Cycle</h2>\
<p>Every morning: Daily Command Brief regenerates. Culture signals, market heat, sports slate, pipelines, brand movement. First member of the day triggers generation; everyone after sees the cached version instantly.</p>\
<h2>The Safety Net</h2>\
<ul><li><strong>Nothing sensitive in your browser.</strong> Master keys, AI keys, payment keys — live behind the Gatekeeper. Pop dev tools and you\'ll find read-only public keys, nothing else.</li>\
<li><strong>The vault refuses unexpected writes.</strong> Row-level rules enforced by the database, not by hoping the app remembers.</li>\
<li><strong>Gatekeeper whitelists every action.</strong> No generic "write anywhere" endpoint. Attackers can\'t invent new actions.</li>\
<li><strong>Ownership validated on every write.</strong> You only modify what you own. The Gatekeeper verifies against the vault — not the browser\'s word for it.</li>\
<li><strong>Audit logs flow continuously.</strong> Every sale, referral, credit transaction, admin action, invitation — logged and traceable.</li></ul>\
<p class="muted"><em>This is the architecture we\'d expect if we were the customer. So it\'s the architecture we built.</em></p>'

    body: '\

    crumb:'Specialist Suites › Creative Lab',
    body: '\

  'creative-workflows': {
    crumb:'Studio &amp; Creative &rsaquo; Creative Workflows',
    body: '<h2>End-to-end plays you can run today</h2><p>These chain the creative tools into repeatable content systems &mdash; the backbone of a content business built on CPD Blackbook.</p><h2>1. Faceless short-form factory</h2><ol><li><strong>Studio &rarr; Image</strong>: generate a strong key visual (lock a <strong>Series</strong> so the whole set matches).</li><li><strong>Studio &rarr; Video</strong>: animate the image (I2V) + a camera move.</li><li><strong>Music/Audio &rarr; Text&rarr;Voiceover</strong>: narrate with your <a onclick=\'go(\"tool:voice-clone\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">cloned voice</a>.</li><li><strong>Captions</strong>: auto-generate SRT/VTT.</li><li><strong>Organize bar</strong>: file into a &ldquo;Channel X&rdquo; folder, then post.</li></ol><h2>2. Explainer / spokesperson video</h2><ol><li>Write the script (or <strong>&#10024; Write with AI</strong> in Avatars).</li><li><a onclick=\'go(\"tool:voice-clone\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Clone your voice</a> once.</li><li><a onclick=\'go(\"tool:avatars\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Avatars</a>: Voice Library &rarr; Use your voice &rarr; generate.</li><li><a onclick=\'go(\"tool:upscale\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Upscale</a> to 1080p/4K for ad use.</li></ol><h2>3. Client campaign in a day</h2><ol><li><a onclick=\'go(\"tool:brand-kits\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Brand Kit</a>: load the client&rsquo;s colors/logo/fonts.</li><li><strong>Studio</strong>: lock a Series to that brand, batch &times;4 across formats.</li><li><strong>Organize</strong>: everything into a per-client <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a> folder; share the folder with the client.</li><li>Wrap results into a <a onclick=\'go(\"tool:reports\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Report</a> and share it.</li></ol><h2>4. Viral community post</h2><ol><li><a onclick=\'go(\"tool:comedy\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Comedy Engine</a>: forge a confession-style post + scene images.</li><li>Polish in <strong>Meme / GIF Lab</strong> if needed.</li><li>Post to the <a onclick=\'go(\"tool:forum\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Forum</a> Showcase to build audience.</li></ol><h2>Operating tips</h2><ul><li>Build a <strong>folder + Series per client/channel</strong> &mdash; consistency is the brand.</li><li>Clone voices once; reuse across hundreds of pieces.</li><li>Draft cheap, finalize premium, upscale last.</li></ul>'

  'studio': {
    crumb:'Studio &amp; Creative &rsaquo; Studio',
    body: '<h2>What Studio Is</h2><p><strong>Studio</strong> is the flagship creation engine — one workspace, 50+ AI models, one credit wallet. Everything you make (images, video, voice, avatars) lands in your <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a>. Open it from the sidebar: <strong>Flagship &rsaquo; Studio</strong>.</p><h2>The Modes (left rail) — and when to use each</h2><ul><li><strong>Image</strong> (T2I + I2I, 18 models) — thumbnails, ad creative, product shots, characters. Fast models (Flux Schnell) for drafts; quality models (Nano Banana Pro, Flux 2 Pro) for finals.</li><li><strong>Video</strong> (T2V + I2V, 19 models) — reels, b-roll, ads. Animate a still image (I2V) or generate from text. Supports end-frames, camera moves, and multi-shot on some models.</li><li><strong>Lip Sync</strong> — make an existing clip&rsquo;s mouth match new audio.</li><li><strong>Music / Audio</strong> — songs from a prompt or lyrics, sound FX, and <strong>Text &rarr; Voiceover</strong> (incl. <a onclick=\'go(\"tool:voice-clone\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">your cloned voice</a>).</li><li><strong>Avatars</strong> — a talking presenter from a script or a voice track. See the <a onclick=\'go(\"tool:avatars\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Avatars guide</a>.</li><li><strong>Cinema</strong> — pro camera controls for cinematic shots.</li><li><strong>Upscale</strong> — sharpen + enlarge to 2K/4K. See <a onclick=\'go(\"tool:upscale\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Upscale</a>.</li><li><strong>Logo / 3D / Captions</strong> — brand marks, GLB 3D objects, and SRT/VTT subtitles.</li></ul><h2>Power features that set Studio apart</h2><ul><li><strong>References</strong> — attach an image so the model keeps a character/look consistent. One reference with a description is the single biggest drift-reducer.</li><li><strong>Series</strong> (top bar) — lock an aesthetic, refs, and LoRA so a whole batch of posts stays on-brand.</li><li><strong>Styles &amp; LoRAs</strong> — apply saved looks, or train a LoRA on your own photos for a repeatable signature style.</li><li><strong>Seed lock</strong> — found a look you love? Lock its seed and iterate variations.</li><li><strong>Batch (&times;1&ndash;&times;4)</strong> — fire up to four variations in one press.</li><li><strong>Organize bar</strong> — name, tag, and file each output as you create it. See <a onclick=\'go(\"tool:studio-organize\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Organize Your Outputs</a>.</li></ul><h2>Walkthrough — your first post in 5 steps</h2><ol><li>Sidebar &rsaquo; <strong>Studio</strong> &rarr; pick <strong>Image</strong>.</li><li>Choose a model (start with a fast one to explore).</li><li>Type a prompt &rarr; tap <strong>&#10024; Enhance</strong> to sharpen it.</li><li>In the <strong>Organize bar</strong>, name it and pick a folder.</li><li><strong>Generate &rarr;</strong>. When it lands, animate it (send to <strong>Video</strong>) or post it.</li></ol><h2>Use cases for a content business</h2><ul><li><strong>Faceless channel:</strong> image &rarr; animate &rarr; voiceover &rarr; captions &rarr; post. (See the <a onclick=\'go(\"tool:creative-workflows\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Creative Workflows</a> playbook.)</li><li><strong>Client ad sets:</strong> lock a Series with the client&rsquo;s brand, batch 4 variations, file into their folder.</li><li><strong>Explainer videos:</strong> your cloned voice + an avatar — turn scripts into spokesperson videos at scale.</li></ul><h2>Pro tips</h2><ul><li>Draft on cheap/fast models, finalize on premium — saves credits.</li><li>Reuse a Series so a week of content looks like one brand.</li><li>Name outputs by campaign so your Vault stays searchable.</li></ul>'
  },
  'studio-organize': {
    crumb:'Studio &amp; Creative &rsaquo; Organize Your Outputs',
    body: '<h2>The Problem It Solves</h2><p>AI makes content fast &mdash; which means a messy Vault fast. The <strong>Organize bar</strong> (right above the Generate button in <a onclick=\'go(\"tool:studio\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Studio</a>) files every output the moment it&rsquo;s made, so your library stays a working asset, not a junk drawer.</p><h2>The three controls</h2><ol><li><strong>Name</strong> &mdash; type a name; batches auto-number <code>-1, -2, -3</code>.</li><li><strong>Folder</strong> &mdash; pick a <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a> folder, or tap <strong>+ New</strong> to create one without leaving the page.</li><li><strong>Auto-tag</strong> &mdash; each output is tagged with the model it came from (so you can filter by engine later).</li></ol><h2>Walkthrough &mdash; a campaign-ready naming system</h2><ol><li>Before generating, set <strong>Name</strong> to <code>AcmeQ3-hook</code>.</li><li>Set <strong>Folder</strong> to <code>Acme &rsaquo; Q3 Launch</code> (create it with + New).</li><li>Batch &times;4 &mdash; you get <code>AcmeQ3-hook-1</code> &hellip; <code>-4</code>, all filed and tagged.</li></ol><h2>Use cases</h2><ul><li><strong>Per-client folders</strong> &mdash; one folder per client keeps deliverables clean and shareable.</li><li><strong>Per-channel</strong> &mdash; faceless operators: a folder per channel, named by hook.</li><li><strong>Searchable archive</strong> &mdash; consistent names + tags make the <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a> and platform search actually useful.</li></ul><h2>Pro tip</h2><p>Decide a naming convention once (<code>Client-Campaign-Asset</code>) and your whole team&rsquo;s output self-organizes. Pair it with a <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">shared Vault folder</a> for instant client delivery.</p>'
  },
  'voice-clone': {
    crumb:'Studio &amp; Creative &rsaquo; Clone Your Voice',
    body: '<h2>What It Is</h2><p>Make a reusable, high-fidelity copy of your own voice. Once cloned, it powers <strong>voiceovers</strong> and <strong>talking-avatar explainers</strong> — so you can scale narrated content without re-recording.</p><h2>Record a great sample (this decides quality)</h2><ul><li><strong>1&ndash;2 minutes</strong> of clear speech is the sweet spot. More isn&rsquo;t better past ~3 min.</li><li>Quiet room, <strong>one speaker</strong>, no music or background noise.</li><li>Talk the way you&rsquo;ll actually use it — narrate naturally, not robotically. The clone copies your delivery, not just your timbre.</li><li>Tip: read a real script you&rsquo;d use (an intro + a couple of feature lines) for ~90 seconds.</li></ul><h2>Walkthrough — clone it</h2><ol><li>Sidebar &rsaquo; <strong>Studio</strong> &rarr; <strong>Music / Audio</strong> &rarr; mode <strong>Text &rarr; Voiceover</strong>.</li><li>Next to the Voice picker, tap <strong>&#127908; Clone</strong>.</li><li><strong>Record</strong> in-browser or <strong>upload</strong> a clean MP3/WAV.</li><li>Name it (e.g. &ldquo;My Voice&rdquo;) and tap <strong>Clone Voice</strong> &mdash; it saves to <strong>My Voices</strong>.</li></ol><h2>Put it to work</h2><ul><li><strong>Voiceovers:</strong> Text &rarr; Voiceover, pick your voice, type the script, generate an MP3 to your Vault.</li><li><strong>Avatar explainers:</strong> in <a onclick=\'go(\"tool:avatars\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Avatars</a>, open <strong>&#128218; Voice Library &rarr; Use</strong> on your clone &mdash; the avatar speaks in your voice.</li></ul><h2>Use cases for a content business</h2><ul><li><strong>Explainer series</strong> — one cloned voice narrates an entire course or product line, consistently.</li><li><strong>Faceless / multi-channel</strong> — narrate dozens of videos without booth time.</li><li><strong>Ads &amp; VSLs</strong> — spin script variations fast for A/B testing.</li><li><strong>Branded intros/outros</strong> — a signature voice across every piece.</li></ul><h2>Good to know</h2><ul><li>Voice cloning needs an ElevenLabs plan that includes it.</li><li>You can keep multiple voices (yours, a co-host&rsquo;s, a brand persona) in My Voices.</li></ul>'
  },
  'avatars': {
    crumb:'Studio &amp; Creative &rsaquo; Talking Avatars',
    body: '<h2>What It Is</h2><p>Turn a photo + a script (or a voice track) into a <strong>talking-presenter video</strong> &mdash; ideal for explainers, course intros, ads, and spokespersons. Open from the sidebar: <strong>Studio &rarr; Avatars</strong>.</p><h2>Two families — pick the right one</h2><ul><li><strong>HeyGen Avatar IV / V</strong> &mdash; speak a <em>script</em> directly using 200+ built-in voices, OR animate your own image. Great when you want fast, built-in narration. (Note: V only animates registered presenters; use IV / the audio-driven models for your own photo.)</li><li><strong>Kling Avatar, Creatify Aurora, OmniHuman</strong> (audio-driven) &mdash; these take a <em>portrait + a voice track</em> and lip-sync to it. This is the path for using <a onclick=\'go(\"tool:voice-clone\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">your cloned voice</a> on your own face/character.</li></ul><h2>Walkthrough — an explainer in your own voice</h2><ol><li>Studio &rarr; <strong>Avatars</strong>. Add your photo (or pick a presenter) and write the script (or tap <strong>&#10024; Write with AI</strong>).</li><li>Open <strong>&#128218; Voice Library</strong> and tap <strong>Use</strong> on your cloned voice &mdash; it generates the voiceover and sets it as the avatar&rsquo;s audio (MP3, so every model accepts it).</li><li>Set <strong>background</strong> (keep / solid / image), <strong>expressiveness</strong>, orientation, and resolution (1080p for finals).</li><li><strong>Generate</strong> &mdash; the talking video saves to your Vault. <a onclick=\'go(\"tool:upscale\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Upscale</a> it for ad-grade polish.</li></ol><h2>Use cases for a content business</h2><ul><li><strong>Explainer / course videos</strong> at scale &mdash; same presenter + voice across every lesson.</li><li><strong>Spokesperson ads &amp; VSLs</strong> &mdash; record once (the clone), generate many.</li><li><strong>Multilingual</strong> &mdash; same avatar delivering localized scripts.</li><li><strong>Save a Character</strong> (My Avatars) so a client&rsquo;s presenter is one click every time.</li></ul><h2>Tips &amp; gotchas</h2><ul><li>Audio uploads must be <strong>MP3 or WAV</strong> &mdash; M4A is rejected. The cloned-voice path outputs MP3 automatically.</li><li>Audio-driven models <em>require</em> a voice track; HeyGen can speak a script without one.</li><li>Keep scripts tight &mdash; shorter takes render faster and look more natural.</li></ul>'

  'upscale': {
    crumb:'Studio &amp; Creative &rsaquo; Upscale Studio',
    body: '<h2>What It Is</h2><p>Sharpen and enlarge any image or video <strong>up to 4x</strong> (to 2K/4K) &mdash; cleaner detail, crisp edges, ad- and print-grade polish. The standard image upscaler is cheap (often 0 cr), so it&rsquo;s the natural last step on anything you ship.</p><h2>Walkthrough</h2><ol><li>Sidebar &rsaquo; <a onclick=\'go(\"tool:studio\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Studio</a> &rarr; <strong>Upscale</strong>.</li><li>Pick a source from your <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a> (or upload one).</li><li>Choose a factor (<strong>2x</strong> or <strong>4x</strong>) and <strong>Generate</strong> &mdash; no prompt needed.</li><li>The enhanced file saves back to your Vault.</li></ol><h2>Use cases</h2><ul><li><strong>Finalize before posting</strong> &mdash; upscale a draft-resolution image or video to look premium.</li><li><strong>Avatar &amp; video polish</strong> &mdash; upscale a <a onclick=\'go(\"tool:avatars\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">talking-avatar</a> clip to 1080p/4K for ads.</li><li><strong>Print &amp; thumbnails</strong> &mdash; get the resolution print and large thumbnails need.</li><li><strong>Restore</strong> &mdash; sharpen older or low-res assets you already own.</li></ul><h2>Pro tip</h2><p>Workflow order matters: <em>draft on a cheap model &rarr; finalize &rarr; upscale last</em>. Upscaling a finished piece beats generating everything at max resolution (and saves credits).</p>'

  'vault': {
    crumb:'Studio &amp; Creative &rsaquo; The Vault',
    body: '<h2>What It Is</h2><p>Your central media library. Every <a onclick=\'go(\"tool:studio\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Studio</a> output and upload lives here &mdash; images, video, audio, 3D &mdash; ready to organize, reuse, and share.</p><h2>Organize</h2><ul><li><strong>Folders</strong> &mdash; group by client, campaign, or channel (file at creation via the <a onclick=\'go(\"tool:studio-organize\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Organize bar</a>).</li><li><strong>Tags &amp; rename</strong> &mdash; make everything findable; filter by kind or tag.</li><li><strong>Reuse</strong> &mdash; pull any asset back into Studio as a reference, or into the Forum / Content Studio.</li></ul><h2>Share &amp; collaborate</h2><ol><li><strong>Share a folder</strong> with another member as <strong>viewer</strong> or <strong>editor</strong>.</li><li>Create a <strong>share link</strong> (optionally password-protected) to send files to non-members.</li><li>See exactly who has access under <strong>Folder members</strong>.</li></ol><h2>Use cases</h2><ul><li><strong>Client delivery</strong> &mdash; a shared folder per client; drop finals in, they pull them out.</li><li><strong>Team library</strong> &mdash; editors collaborate on a shared folder of brand assets.</li><li><strong>Asset bank</strong> &mdash; reusable b-roll, logos, and characters for fast assembly.</li></ul><h2>Pro tip</h2><p>Treat the Vault as your delivery system: one <a onclick=\'go(\"tool:brand-kits\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Brand Kit</a> + one shared folder per client = a repeatable, professional handoff every time.</p>'

  'meme-gif': {

    body: '<h2>What It Is</h2><p>Two fast, lightweight makers &mdash; <strong>Meme Lab</strong> and <strong>GIF Lab</strong> &mdash; wired straight into your <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a>. Built for speed: react to a moment, ship it the same hour.</p><h2>Walkthrough</h2><ol><li>Open <strong>Meme Lab</strong> or <strong>GIF Lab</strong> from the sidebar.</li><li>Pick or paste an image (Vault images work), add text or frames.</li><li>Save &mdash; the result lands in your Vault to post or drop into a <a onclick=\'go(\"tool:forum\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Forum</a> post.</li></ol><h2>Use cases</h2><ul><li><strong>Reactive social</strong> &mdash; jump on trends with a same-day meme.</li><li><strong>Community engagement</strong> &mdash; post to the Forum Showcase to spark replies.</li><li><strong>Brand voice</strong> &mdash; consistent meme templates make a recognizable page.</li></ul><h2>Pro tip</h2><p>For bigger swings, start in the <a onclick=\'go(\"tool:comedy\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Comedy Engine</a> (it writes the concept + scene), then polish the visual in Meme Lab.</p>'

  'brand-kits': {
    crumb:'Studio &amp; Creative &rsaquo; Brand Kits',
    body: '<h2>What It Is</h2><p>Save a brand&rsquo;s <strong>colors, logos, and fonts</strong> in one place so everything you create stays on-brand &mdash; across <a onclick=\'go(\"tool:studio\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Studio</a>, reports, and print.</p><h2>Walkthrough</h2><ol><li>Open <strong>Brand Kits</strong> and create a kit (one per brand/client).</li><li>Add the <strong>palette</strong> (hex colors), upload <strong>logos</strong>, and set <strong>fonts</strong>.</li><li>Apply the kit when generating in Studio or building <a onclick=\'go(\"tool:reports\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">reports</a> / <a onclick=\'go(\"tool:print-engine\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">client-preview</a> pieces.</li></ol><h2>Use cases</h2><ul><li><strong>Agency consistency</strong> &mdash; a kit per client guarantees every deliverable matches their brand.</li><li><strong>Your own brand</strong> &mdash; lock your colors/logo so all your content is instantly recognizable.</li><li><strong>Faster handoffs</strong> &mdash; new team members produce on-brand work day one.</li></ul><h2>Pro tip</h2><p>Pair a Brand Kit with a Studio <strong>Series</strong> (locked aesthetic) and a per-client <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault folder</a> &mdash; that trio is a whole content operation in three clicks.</p>'

  'relay': {
    crumb:'Studio &amp; Creative &rsaquo; Relay (Chains)',
    body: '<h2>What It Is</h2><p>Relay turns <a onclick=\'go(\"tool:studio\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Studio</a> into a <strong>pipeline</strong>: chain steps so the output of one automatically feeds the next. Build a content recipe once, run it again and again.</p><h2>Walkthrough</h2><ol><li>Open <strong>Relay</strong> (Studio top bar, or the sidebar).</li><li>Add steps, e.g. <em>generate image &rarr; animate &rarr; add voiceover</em>.</li><li>Run the chain &mdash; each stage hands its result to the next; outputs land in your <a onclick=\'go(\"tool:vault\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Vault</a>.</li></ol><h2>Use cases</h2><ul><li><strong>Repeatable formats</strong> &mdash; a faceless short-form recipe you run daily (see the <a onclick=\'go(\"tool:creative-workflows\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Creative Workflows</a> playbook).</li><li><strong>Batch production</strong> &mdash; same chain, different prompts, for a week of content.</li><li><strong>Team templates</strong> &mdash; standardize how content gets made so quality is consistent.</li></ul><h2>Pro tip</h2><p>Pair Relay with your <a onclick=\'go(\"tool:voice-clone\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">cloned voice</a> and a Series so an entire chain &mdash; visuals, motion, narration &mdash; comes out on-brand and in your voice.</p>'

    body: '<h2>What It Is</h2><p>Build and deliver polished, persuasive pitches to prospects and clients &mdash; then move the won deal straight into your <a onclick=\'go(\"tool:pipeline\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Pipeline</a>.</p><h2>Walkthrough</h2><ol><li>Open <strong>Pitch Room</strong> and start a new pitch.</li><li>Pull plans/products from the <a onclick=\'go(\"tool:catalog\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Catalog</a> so pricing and commission are always current.</li><li>Tailor the offer to the prospect &mdash; lead with their problem, then the fit.</li><li>Enrich the contact first with <a onclick=\'go(\"tool:factfinder\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Fact Finder</a> so you pitch to what they actually do.</li><li>Share or present it &mdash; then push the deal into your <a onclick=\'go(\"tool:pipeline\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Pipeline</a> and, when they&rsquo;re ready to sign, the <a onclick=\'go(\"tool:deal-room\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Deal Room</a>.</li></ol><h2>Use cases</h2><ul><li><strong>Inbound prospect</strong> &mdash; a clean, branded pitch beats a wall of text.</li><li><strong>Upsell an existing client</strong> &mdash; pull the next tier from the Catalog and frame the upgrade.</li><li><strong>Partner/sponsor decks</strong> &mdash; reusable structure you tailor per target.</li></ul><h2>Pro tip</h2><p>Pitch &rarr; close &rarr; sign is one motion: <a onclick=\'go(\"tool:catalog\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Catalog</a> for the offer, <a onclick=\'go(\"tool:pipeline\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Pipeline</a> to track it, <a onclick=\'go(\"tool:deal-room\")\' style="color:#C9A84C;cursor:pointer;font-weight:600">Deal Room</a> to get the signature.</p>'

function search(query){
  var q = (query||'').trim().toLowerCase();
  if(!q){ showView('home'); setActive('home'); return; }
  var results = [];

  // Tools
  TOOLS.forEach(function(t){
    var hay = (t.title + ' ' + t.desc + ' ' + (t.cat||'') + ' ' + (t.tag||'')).toLowerCase();
    if(hay.indexOf(q) > -1){
      results.push({ kind:'Tool', title:t.title, snippet:t.desc, route:'tool:'+t.id });
    }
  });

  // Articles (bodies)
  Object.keys(ARTICLES).forEach(function(id){
    var a = ARTICLES[id];
    // skip if already matched as a tool
    if(results.some(function(r){return r.route==='tool:'+id})) return;
    var plain = (a.body||'').replace(/<[^>]+>/g,' ');
    var low = plain.toLowerCase();
    var idx = low.indexOf(q);
    if(idx > -1){
      var start = Math.max(0, idx-60);
      var end   = Math.min(plain.length, idx + q.length + 120);
      var snip = (start>0?'…':'') + plain.substring(start,end) + (end<plain.length?'…':'');
      var title = (a.crumb||'').split('›').pop().trim() || id;
      results.push({ kind:'Article', title:title, snippet:snip, route:'tool:'+id });
    }
  });

  // Categories
  CATEGORIES.forEach(function(c){
    var hay = (c.label + ' ' + c.desc).toLowerCase();
    if(hay.indexOf(q) > -1){
      results.push({ kind:'Category', title:c.label, snippet:c.desc, route:'cat:'+c.id });
    }
  });

  // Docs
  DOCS.forEach(function(d){
    var hay = (d.name + ' ' + (d.desc||'')).toLowerCase();
    if(hay.indexOf(q) > -1){
      results.push({ kind:'Document', title:d.name, snippet:d.desc||'', route:'cat:docs' });
    }
  });

  renderSearchResults(q, results);
  showView('search');
  setActive('');
}

function renderSearchResults(q, results){
  var v = document.getElementById('view-search');
  var html = '<div class="hero" style="padding:24px 28px;margin-bottom:18px">'
           +   '<div class="hero-eyebrow">◆ SEARCH</div>'
           +   '<div class="hero-title" style="font-size:40px">RESULTS FOR "'+escHtml(q).toUpperCase()+'"</div>'
           +   '<div class="hero-sub" style="margin-top:6px">'+results.length+' match'+(results.length===1?'':'es')+' across tools, articles, categories, and documents.</div>'
           + '</div>';

  if(!results.length){
    html += '<div class="search-empty">'
         +    '<div class="search-empty-ico">?</div>'
         +    '<div style="font-family:var(--fd);font-size:24px;letter-spacing:.05em">NOTHING FOUND</div>'
         +    '<div style="margin-top:8px;color:var(--dim)">Try a different term, or browse categories from the sidebar.</div>'
         +  '</div>';
  } else {
    html += '<div class="search-results">';
    results.forEach(function(r){
      html += '<div class="search-result" onclick="go(\''+r.route+'\')">'
           +    '<div class="search-result-kind">'+r.kind+'</div>'
           +    '<div class="search-result-title">'+r.title+'</div>'
           +    '<div class="search-result-snippet">'+highlight(r.snippet, q)+'</div>'
           +  '</div>';
    });
    html += '</div>';
  }
  v.innerHTML = html;
}

function highlight(txt, q){
  if(!txt) return '';
  var safe = escHtml(txt);
  try{
    var re = new RegExp('('+escRegex(q)+')','ig');
    return safe.replace(re, '<mark>$1</mark>');
  }catch(e){ return safe; }
}
function escHtml(s){ return (s||'').replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
}); }
function escRegex(s){ return (s||'').replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

/* ════════════════════════════════════════════════════════════════
   ROUTING
   ════════════════════════════════════════════════════════════════ */

function safeSetHash(hash){
  // replaceState fails in about:srcdoc (sandboxed previews); fall back to location.hash.
  try { history.replaceState(null, '', '#' + hash); }
  catch(e){
    try { location.hash = hash; } catch(e2){ /* give up silently */ }
  }
}

function go(route){
  if(route === 'home'){
    renderHome(); showView('home'); setActive('home');
    safeSetHash('home');
    return;
  }
  if(route.indexOf('cat:') === 0){
    var catId = route.substring(4);
    renderCategory(catId); showView('category'); setActive('cat:'+catId);
    safeSetHash(route);
    return;
  }
  if(route.indexOf('tool:') === 0){
    var toolId = route.substring(5);
    renderArticle(toolId); showView('article');
    var tool = TOOLS.filter(function(t){return t.id===toolId})[0];
    if(tool) setActive('cat:'+tool.cat); else setActive('');
    safeSetHash(route);
    return;
  }
  // fallback
  renderHome(); showView('home'); setActive('home');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

/* ════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════ */

renderSidebar();
renderTopbarRight();

// Boot route — respect hash if present
var initRoute = (location.hash||'').replace('#','') || 'home';
go(initRoute);

// Search wiring
var sinput = document.getElementById('gsearch');
var stimer;
sinput.addEventListener('input', function(e){
  clearTimeout(stimer);
  var q = e.target.value;
  stimer = setTimeout(function(){ search(q); }, 180);
});
sinput.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){ e.target.value=''; go('home'); }
});
// "/" to focus search
document.addEventListener('keydown', function(e){
  if(e.key === '/' && document.activeElement !== sinput &&
     document.activeElement.tagName !== 'INPUT' &&
     document.activeElement.tagName !== 'TEXTAREA'){
    e.preventDefault(); sinput.focus();
  }
});

// Listen for hash changes (back/forward)
window.addEventListener('hashchange', function(){
  var r = (location.hash||'').replace('#','') || 'home';
  go(r);
});

console.log('[CPD Library] Loaded · Member:', MEMBER_ID || '(none yet)');

</script>
